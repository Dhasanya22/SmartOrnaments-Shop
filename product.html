<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Customize SmartOrnaments personalized gifts with name, color, photo preview, wishlist, reviews, and cart checkout.">
    <meta name="theme-color" content="#ff4d6d">
    <link rel="canonical" href="https://smartornaments.in/product.html">
    <link rel="manifest" href="manifest.webmanifest">
    <title>Product Details - SmartOrnaments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadProduct(); updateCartCount(); showUser();">
    <nav>
        <h2 class="brand">
            <img src="images/Logo.png" alt="SmartOrnaments logo" class="brand-logo">
            <span class="brand-name">SmartOrnaments</span>
        </h2>
        <button class="nav-toggle" onclick="toggleNav(this)" aria-label="Toggle menu">Menu</button>
        <ul>
            <li><a href="products.html">Back</a></li>
            <li><a href="wishlist.html">Wishlist</a></li>
            <li><a href="cart.html">Cart <span id="cartCount">0</span></a></li>
            <li><a href="orders.html">Orders</a></li>
        </ul>
        <div id="userDisplay"></div>
    </nav>

    <section class="product-details">
        <img id="productImg" src="" alt="Product">
        <div id="productGallery" class="product-gallery"></div>
        <h2 id="productName"></h2>
        <div class="product-facts">
            <span id="productCategory" class="product-category"></span>
            <span id="productRating" class="product-rating"></span>
            <span id="productStock" class="stock-pill"></span>
        </div>
        <div class="price">
            <span id="productPrice"></span>
        </div>
        <input type="number" id="qty" value="1" min="1">
        <p id="productDescription"></p>

        <div class="customization-panel">
            <h3>Customize This Product</h3>
            <input type="text" id="customName" placeholder="Name to add on product" oninput="updatePersonalizationPreview()">
            <select id="customColor" aria-label="Preferred color" onchange="updatePersonalizationPreview()">
                <option value="">Select color</option>
                <option value="Pink">Pink</option>
                <option value="Red">Red</option>
                <option value="Gold">Gold</option>
                <option value="Silver">Silver</option>
                <option value="White">White</option>
                <option value="Black">Black</option>
                <option value="Blue">Blue</option>
            </select>
            <input type="file" id="customPhoto" accept="image/*" onchange="handleCustomizationPhoto(this)">
            <div id="customPhotoPreview" class="photo-preview"></div>
            <div id="personalizationPreview" class="personalization-preview">
                <span class="preview-swatch"></span>
                <div>
                    <strong class="preview-name">Your Name</strong>
                    <small>Live personalization preview</small>
                </div>
                <img alt="Uploaded personalization preview">
            </div>
        </div>

        <button onclick="orderProduct()">Order via WhatsApp</button>

        <h3>Generate Gift Message</h3>
        <select id="occasion">
            <option value="birthday">Birthday</option>
            <option value="love">Love</option>
            <option value="friend">Friendship</option>
        </select>

        <br><br>

        <button onclick="generateMessage()">Generate Message</button>
        <button id="productWishlistButton" type="button" onclick="toggleWishlist(localStorage.getItem('productId'))">Add to Wishlist</button>
        <button onclick="addCurrentProductToCart()">Add to Cart</button>

        <p id="msg"></p>

        <section class="product-review-panel">
            <h3>Reviews & Ratings</h3>
            <p id="reviewSummary">No reviews yet</p>
            <form class="review-form" onsubmit="submitProductReview(event)">
                <select id="reviewRating" aria-label="Rating">
                    <option value="5">5 stars</option>
                    <option value="4">4 stars</option>
                    <option value="3">3 stars</option>
                    <option value="2">2 stars</option>
                    <option value="1">1 star</option>
                </select>
                <textarea id="reviewComment" placeholder="Write your review"></textarea>
                <button type="submit">Submit Review</button>
            </form>
            <p id="reviewMessage" class="form-message"></p>
            <div id="productReviews" class="product-reviews"></div>
        </section>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
