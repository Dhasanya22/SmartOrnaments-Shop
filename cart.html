<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SmartOrnaments</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadCart(); updateCartCount(); showUser();">
<nav>
    <h2 class="brand">
        <img src="images/Logo.png" alt="SmartOrnaments logo" class="brand-logo">
        <span class="brand-name">SmartOrnaments</span>
    </h2>
    <button class="nav-toggle" onclick="toggleNav(this)" aria-label="Toggle menu">Menu</button>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart <span id="cartCount">0</span></a></li>
        <li><a href="orders.html">Orders</a></li>
    </ul>

    <div id="userDisplay"></div>
</nav>

<section class="products">
    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <div class="cart-summary-panel">
        <div class="coupon-row">
            <input type="text" id="couponCode" placeholder="Coupon code">
            <button type="button" onclick="applyCoupon()">Apply</button>
            <button type="button" onclick="clearCoupon()">Clear</button>
        </div>
        <p id="couponStatus" class="form-message"></p>
        <div id="cartPriceBreakdown" class="price-breakdown"></div>
        <div class="cart-actions">
            <a href="products.html" class="btn">Continue Shopping</a>
            <a href="checkout.html" class="btn primary-btn">Proceed to Checkout</a>
        </div>
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
