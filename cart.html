<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SmartOrnaments</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadCart(); updateCartCount(); showUser();">
<nav>
    <h2 class="brand">
        <img src="images/Logo.png" alt="SmartOrnaments logo" class="brand-logo">
        <span class="brand-name">SmartOrnaments</span>
    </h2>
    <button class="nav-toggle" onclick="toggleNav(this)" aria-label="Toggle menu">Menu</button>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart <span id="cartCount">0</span></a></li>
        <li><a href="orders.html">Orders</a></li>
    </ul>

    <div id="userDisplay"></div>
</nav>

<section class="products">
    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <div class="checkout-box">
        <h3>Checkout Details</h3>
        <input type="text" id="userName" placeholder="Full name" oninput="updateOrderSummary()">
        <input type="tel" id="phone" placeholder="Phone number" oninput="updateOrderSummary()">
        <input type="text" id="flatNo" placeholder="Flat / house no" oninput="updateOrderSummary()">
        <input type="text" id="areaStreet" placeholder="Area / street" oninput="updateOrderSummary()">
        <select id="addressType" aria-label="Address type" onchange="updateOrderSummary()">
            <option value="Home">Home</option>
            <option value="Work">Work</option>
        </select>
        <select id="state" aria-label="State" onchange="handleStateChange()">
            <option value="">Select state</option>
        </select>
        <select id="district" aria-label="District" onchange="updateOrderSummary()" disabled>
            <option value="">Select state first</option>
        </select>
        <input type="text" id="pincode" placeholder="Pincode" inputmode="numeric" oninput="updateOrderSummary()">
        <input type="text" id="customizationName" placeholder="Name for customization" oninput="updateOrderSummary()">
        <select id="customizationColor" aria-label="Customization color" onchange="updateOrderSummary()">
            <option value="">Select customization color</option>
            <option value="Pink">Pink</option>
            <option value="Red">Red</option>
            <option value="Gold">Gold</option>
            <option value="Silver">Silver</option>
            <option value="White">White</option>
            <option value="Black">Black</option>
            <option value="Blue">Blue</option>
        </select>
        <input type="file" id="customizationPhoto" accept="image/*" onchange="handleCheckoutPhoto(this)">
        <div id="checkoutPhotoPreview" class="photo-preview"></div>
        <textarea id="customization" placeholder="Extra customization message, dates, or gift note" oninput="updateOrderSummary()"></textarea>
        <textarea id="deliveryNote" placeholder="Delivery note, landmark, or preferred time" oninput="updateOrderSummary()"></textarea>
        <div class="order-summary">
            <h3>Order Summary</h3>
            <div id="orderSummary"></div>
        </div>
        <p id="checkoutMsg" class="form-message"></p>
        <button onclick="checkout()" class="checkout-btn">Checkout via WhatsApp</button>
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
