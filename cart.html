<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SmartOrnaments</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadCart(); updateCartCount(); showUser();">
<nav>
    <h2>SmartOrnaments</h2>
    <button class="nav-toggle" onclick="toggleNav(this)" aria-label="Toggle menu">Menu</button>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="orders.html">Orders</a></li>
    </ul>

    <div>
        Cart <span id="cartCount">0</span>
        <span id="userDisplay"></span>
    </div>
</nav>

<section class="products">
    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <div class="checkout-box">
        <h3>Checkout Details</h3>
        <input type="text" id="userName" placeholder="Full name" oninput="updateOrderSummary()">
        <input type="tel" id="phone" placeholder="Phone number" oninput="updateOrderSummary()">
        <input type="text" id="address" placeholder="Delivery address" oninput="updateOrderSummary()">
        <textarea id="customization" placeholder="Customization message, names, dates, or gift note" oninput="updateOrderSummary()"></textarea>
        <textarea id="deliveryNote" placeholder="Delivery note, landmark, or preferred time" oninput="updateOrderSummary()"></textarea>
        <div class="order-summary">
            <h3>Order Summary</h3>
            <div id="orderSummary"></div>
        </div>
        <p id="checkoutMsg" class="form-message"></p>
        <button onclick="checkout()" class="checkout-btn">Checkout via WhatsApp</button>
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
