services:
  - type: web
    runtime: node
    name: smartornaments-shop
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: smartornaments-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        value: smartornaments.shop@gmail.com
